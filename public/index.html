<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - FitHub</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    
   
    <main class="login-page">
      <section class="login-card">
        <img src="./logo.png" alt="Logo FitHub" class="logo" width="160" height="160" />

        <h1>Entrar</h1>
        <p class="subtitle">Acesse sua conta para continuar</p>

        <div id="msg" class="msg" role="alert" hidden></div>

        <form class="login-form" id="form-login" novalidate>
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="seuemail@exemplo.com"
            required
            autocomplete="username"
          />

          <label for="senha">Senha</label>
          <input
            id="senha"
            name="senha"
            type="password"
            placeholder="Digite sua senha"
            required
            autocomplete="current-password"
          />

          <button type="submit">Entrar</button>
        </form>

        <p class="form-footer">
          Ainda não tem conta? <a href="./register.html">Criar conta</a>
        </p>
      </section>
    </main>
    <script src="./login.js"></script>
  </body>
</html>
